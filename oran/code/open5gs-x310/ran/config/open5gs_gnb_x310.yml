# This example configuration outlines how to configure the srsRAN Project gNB to create a single FDD cell
# transmitting in band 78, with 100 MHz bandwidth and 30 kHz sub-carrier-spacing. A USRP X3XX is configured
# as the RF frontend using split 8.

cu_cp:
  amf:
    # AMF NGAP endpoint (SCTP). In this repo it is defined by core/config/amf.yaml.
    addr: 127.0.1.100
    port: 38412
    bind_addr: 127.0.0.1
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1
ru_sdr:
  device_driver: uhd
  device_args: type=x300, addr=192.168.40.3, master_clock_rate=184.32e6
  clock: internal
  sync: internal
  srate: 184.32
  tx_gain: 30
  rx_gain: 30

cell_cfg:
  dl_arfcn: 650000
  band: 78
  channel_bandwidth_MHz: 100
  common_scs: 30
  plmn: "00101"
  tac: 7
  pci: 1

log:
  filename: /tmp/gnb.log
  all_level: info

pcap:
  mac_enable: false
  mac_filename: /tmp/gnb_mac.pcap
  ngap_enable: false
  ngap_filename: /tmp/gnb_ngap.pcap
