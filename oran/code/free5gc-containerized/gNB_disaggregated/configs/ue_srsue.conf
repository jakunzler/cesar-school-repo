# srsUE — free5GC + gNB_desagregated (DU ZMQ) ou gNB_tradicional
# IMSI 208930000000001, DNN internet, ZMQ 2002/2003.
#
# Se vir «Opening 2 channels» e portas 2002/2003, o UE está em LTE+NR: falta
# [rat.eutra] dl_earfcn + nof_carriers=0 ou usar tx_port0/rx_port0 explícitos.
# Ref.: docs srsRAN 5G SA E2E (dl_earfcn em eutra mesmo com 0 portadoras LTE).
#
# [rat.nr] dl_nr_arfcn / ssb_nr_arfcn / scs: obrigatórios para muitos srsUE (srsRAN_4G) com ZMQ —
# alinhar ao que o gNB/DU imprime no arranque (ex.: dl_ssb_arfcn=368410). Sem isto: «Attaching…» eterno.
# Ver: https://github.com/srsran/srsRAN_Project/issues/1318

[rf]
device_name = zmq
# Um só portador NR: use tx_port0/rx_port0 (srsUE 23.x mapeia assim com 1 canal).
device_args = tx_port0=tcp://0.0.0.0:2003,rx_port0=tcp://127.0.0.1:2002,id=ue,base_srate=23.04e6
srate = 23.04e6
nof_antennas = 1

[rat.eutra]
# Obrigatório para o parser SA em várias versões; nof_carriers=0 desliga LTE.
dl_earfcn = 3350
nof_carriers = 0

[usim]
mode = soft
algo = milenage
opc = 8e27b6af0e692e750f32667a3b14605d
k = 8baf473f2f8fd09487cccbd7097c6862
imsi = 208930000000001
imei = 353490069873319

[rat.nr]
bands = 3
nof_carriers = 1
max_nof_prb = 106
nof_prb = 106
scs = 15
# Mesmos ARFCN que du-zmq-srsue.yml / log do DU: «dl_arfcn=368500 … dl_ssb_arfcn=368410»
dl_nr_arfcn = 368500
ssb_nr_arfcn = 368410

[log]
all_level = debug
filename = /tmp/srsue_gnb_desagregated.log
file_max_size = -1

[rrc]
release = 15
ue_category = 4

[nas]
# DNN alinhado ao supportDnnList do AMF. S-NSSAI (sst/sd) não se define normalmente aqui:
# o UE usa o perfil de subscrição no UDM (add-subscriber.sh), que deve coincidir com
# amfcfg plmnSupportList e com cu.yml tai_slice_support_list / DU cell_cfg (PLMN/TAC).
apn = internet
apn_protocol = ipv4
