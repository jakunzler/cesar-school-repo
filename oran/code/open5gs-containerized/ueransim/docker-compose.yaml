services:
  ueransim:
    container_name: ueransim
    image: gradiant/ueransim:3.2.6
    privileged: true
    restart: unless-stopped
    volumes:
      - ./configs/gnb.yaml:/ueransim/config/gnb.yaml
      - ./configs/ue.yaml:/ueransim/config/ue.yaml
      - ./configs/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      core_net-n2:
        ipv4_address: 10.20.0.101
      core_net-n3:
        ipv4_address: 10.30.0.11

    healthcheck:
      test: ["CMD-SHELL", "ip a | grep -q uesimtun"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  core_net-n2:
    external: true
  core_net-n3:
    external: true
