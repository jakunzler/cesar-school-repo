events {}

http {
    include /etc/nginx/mime.types;
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8080;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        location /a1-policy/ {
            set $upstream nonrtric-gateway;
            proxy_pass http://$upstream:9090;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
