# nonRT RIC — perfil Fase 2 (A1 real via ric-plt-a1, sem simuladores)
# Fase 1 inalterada: docker-compose.yml

services:
  policy-agent:
    image: "${PMS_IMAGE_BASE}:${PMS_IMAGE_TAG}"
    container_name: nonrt-policy-agent-oran
    hostname: policy-agent
    networks:
      - oran-nonrt
      - oran-ric
    ports:
      - "${NONRT_PMS_HTTP_PORT:-8081}:8081"
      - "${NONRT_PMS_HTTPS_PORT:-8433}:8433"
    volumes:
      - ./application-policyagent.yaml:/opt/app/policy-agent/config/application.yaml:ro
      - ./application_configuration.oran.json:/opt/app/policy-agent/data/application_configuration.json:ro
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -c 'exec 3<>/dev/tcp/localhost/8081 &&
          printf "GET /status HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 &&
          head -c 256 <&3 | grep -q "hunky dory"'
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  nonrtric-gateway:
    image: "${NONRTRIC_GATEWAY_IMAGE_BASE}:${NONRTRIC_GATEWAY_IMAGE_TAG}"
    container_name: nonrtric-gateway-oran
    hostname: nonrtric-gateway
    depends_on:
      policy-agent:
        condition: service_healthy
    networks:
      - oran-nonrt
    ports:
      - "${NONRT_GATEWAY_PORT:-9090}:9090"
    volumes:
      - ./application-gateway.yaml:/opt/app/nonrtric-gateway/config/application.yaml:ro
    restart: unless-stopped

  policy-control-panel:
    image: "${CONTROL_PANEL_IMAGE_BASE}:${CONTROL_PANEL_IMAGE_TAG}"
    container_name: nonrt-control-panel-oran
    depends_on:
      - nonrtric-gateway
    networks:
      - oran-nonrt
    ports:
      - "${NONRT_CONTROL_PANEL_PORT:-8181}:8080"
    volumes:
      - ./nginx-control-panel.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

networks:
  oran-nonrt:
    name: oran-nonrt-oran-net
    driver: bridge
  oran-ric:
    name: oran-sc-ric_ric_network
    external: true
