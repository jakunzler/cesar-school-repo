services:
  smo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: oai-smo-lab:local
    container_name: smo-api
    command: ["python3", "-m", "smo_lab.api"]
    environment:
      SMO_DB_PATH: /data/smo-lab.db
      SMO_HOST: 0.0.0.0
      SMO_PORT: "8080"
    ports:
      - "${SMO_API_PORT:-18080}:8080"
    volumes:
      - smo-data:/data
    networks:
      - smo-lab
    healthcheck:
      test: ["CMD", "python3", "-m", "smo_lab.healthcheck", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 12

  o1-sim:
    image: oai-smo-lab:local
    container_name: smo-o1-sim
    command: ["python3", "-m", "smo_lab.o1_sim"]
    environment:
      SMO_API_URL: http://smo-api:8080
      O1_SIM_INTERVAL: "${O1_SIM_INTERVAL:-15}"
    depends_on:
      smo-api:
        condition: service_healthy
    networks:
      - smo-lab

  kpm-collector:
    image: oai-smo-lab:local
    container_name: smo-kpm-collector
    command: ["python3", "-m", "smo_lab.kpm_collector"]
    environment:
      SMO_API_URL: http://smo-api:8080
      KPM_POLL_INTERVAL: "${KPM_POLL_INTERVAL:-5}"
      KPM_LOG_FILES: /lab-logs/xapp_kpm_lab.log,/lab-logs/xapp_oai_kpm.log
    volumes:
      - ../../logs:/lab-logs:ro
    depends_on:
      smo-api:
        condition: service_healthy
    networks:
      - smo-lab

  ml-workflow:
    image: oai-smo-lab:local
    container_name: smo-ml-workflow
    command: ["python3", "-m", "smo_lab.ml_workflow"]
    environment:
      SMO_API_URL: http://smo-api:8080
      ML_WORKFLOW_INTERVAL: "${ML_WORKFLOW_INTERVAL:-20}"
      ML_THROUGHPUT_LOW_KBPS: "${ML_THROUGHPUT_LOW_KBPS:-5}"
      ML_PRB_HIGH_PCT: "${ML_PRB_HIGH_PCT:-80}"
    depends_on:
      smo-api:
        condition: service_healthy
    networks:
      - smo-lab

networks:
  smo-lab:
    name: oai-smo-lab-net
    driver: bridge

volumes:
  smo-data:
    name: oai-smo-lab-data
