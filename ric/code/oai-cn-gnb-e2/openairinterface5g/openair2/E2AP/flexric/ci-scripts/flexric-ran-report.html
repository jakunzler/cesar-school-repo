<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            font-size: 15px;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Styling: Pantone 2295C (#009ee0) */
        .table thead th {
            background-color: #009ee0;
            color: white;
            text-align: center;
            vertical-align: middle !important;
            border: 1px solid #007bb0 !important;
            padding: 10px;
            font-size: 16px;
        }

        /* Global Cell Alignment */
        .table-bordered td {
            border: 1px solid #dee2e6 !important;
            vertical-align: middle !important;
            padding: 8px 12px;
        }
        .test-table td {
            height: 100px;
        }
        .bg-index {
            background-color: #eef7ff !important;
            text-align: center;
            color: #000;
            font-weight: bold;
        }
        .bg-status-ok {
            background-color: #90EE90 !important;
            text-align: center;
            color: #000;
        }

        .bg-status-fail {
            background-color: #f07a70 !important;
            text-align: center;
            color: #000 !important;
        }

        .col-options {
            text-align: center;
        }

        .stats-data {
            white-space: pre-wrap;
            margin: 0;
            font-family: "Times New Roman", Times, serif;
            line-height: 1.3;
            background: none;
            border: none;
            padding: 0;
            text-align: left;
            font-size: 15px;
        }

        .container { max-width: 95%; margin-top: 30px; margin-bottom: 50px; }
        hr { margin: 8px 0; opacity: 0.2; }

        /* Final Result Alignment */
        .final-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }
        .final-result-table {
            width: 300px;
        }
        .final-result-table td {
            height: 50px !important;
            font-weight: bold;
            font-size: 15px;
            vertical-align: middle !important;
        }
    </style>
</head>
<body>
  <div class="container-fluid" style="margin-left:1em; margin-right:1em">
  <table width = "100%" style="border-collapse: collapse; border: none;">
   <tr style="border-collapse: collapse; border: none;">
   <td style="border-collapse: collapse; border: none;">
     <a href="http://www.openairinterface.org/">
        <img src="http://www.openairinterface.org/wp-content/uploads/2016/03/cropped-oai_final_logo2.png" alt="" border="none" height=50 width=150>
        </img>
     </a>
   </td>
   <td style="border-collapse: collapse; border: none; vertical-align: center;">
     <b><font size = "6">Job Summary -- Job: JOB_NAME -- Build-ID: <a href="BUILD_URL">BUILD_ID</a></font></b>
   </td>
   </tr>
  </table>
  <br>

<div class="container">
    <div class="table-responsive">
        <table class="table table-bordered test-table">
            <thead>
                <tr>
                    <th style="width: 10%;">Test Index</th>
                    <th style="width: 25%;">Description</th>
                    <th style="width: 20%;">Options</th>
                    <th style="width: 10%;">Status</th>
                    <th style="width: 35%;">Info</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="bg-index">{{ test_index }}</td>
                    <td>{{ description }}</td>
                    <td class="col-options">{{ options }}</td>
                    <td class="{{ status_class }}">{{ status }}</td>
                    <td>{{ info_content }}</td>
                </tr>
                </tbody>
        </table>
    </div>

    <div class="final-wrapper">
        <table class="table table-bordered final-result-table">
            <tbody>
                <tr>
                    <td style="background-color: #f8f9fa; text-align: right; width: 60%;">Final Status:</td>
                    <td class="{{ final_status_class }}" style="text-align: center;">{{ final_status }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</div>

<div class="text-center" style="font-size: 12px; color: #666; padding: 10px 0; margin-top: auto;">
    End of Test Report -- Copyright <span class="glyphicon glyphicon-copyright-mark"></span> 2026
    <a href="https://openairinterface.org" target="_blank" rel="noopener noreferrer">
     OpenAirInterface.org
    </a>  All rights reserved.
</div>

</body>
</html>
